<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Concert+One&family=Londrina+Outline&family=Londrina+Solid&family=Varela+Round&display=swap" rel="stylesheet">
  </head>
<!-- add in the bg cycle once done and remove whatever is here-->
  <body style="height: 100vh; background-image: url('assets/bg-images/image10.gif'); background-size: cover; background-repeat: no-repeat; margin: 0px;">


    <div class="top-bar">

      <p class="subheading-font" style="margin-left: 16px; margin: 0; margin-left: 16px;">
        pokeOS v0.1.0-beta
      </p>

      <button onclick="playTheme()" id="playBtn" class="subheading-font" >
        Gotta Catch 'Em All!
      </button>

      <p id="timeThingy" class="subheading-font" style="margin-right: 16px; margin: 0; margin-right: 16px;">
        6/21/2023 3:41 PM
      </p>


    </div>










    <div class="bottom-bar">

        <button id="welcomeopen" class="subheading-font" >
          WELCOME WINDOW
        </button>
  




    </div>











    <div id="welcome" class="draggable-window welcome">
      <div id="welcomeheader" class="subheading-font header" >
        Welcome to pokeOS!
      </div>
      <div id="welcomeclose" class="close-button"></div>

      <img src="assets/logo.png" alt="pokeOS logo" width="256" height="auto" class="logo" style="margin-top: 16px;" />
      <h1 class="pokemon-font">pokeOS</h1>
      <p class="text-font"><dfn>pokeOS</dfn> is a simple operating system for <strong>Pokemon</strong>.</p>
    </div>



    <script src="script.js"></script>

  </body> 
</html>
